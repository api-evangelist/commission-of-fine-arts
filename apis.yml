description: >-
  The U.S. Commission of Fine Arts (CFA) is an independent federal agency
  established in 1910 that has review authority over the design and
  aesthetics of construction within Washington, D.C., and over coins,
  medals, and Federal commemorative works. The CFA also appoints the Old
  Georgetown Board which conducts design review for projects in the
  Georgetown Historic District. As of April 2026 the CFA does not publish
  a public developer API, OpenAPI specifications, or a developer program.
  Project records are accessible through the CFA's web-based Project
  Search tool and via the records-and-research process documented at
  cfa.gov.
